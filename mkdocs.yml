site_name: dotfiles
site_description: Personal macOS dotfiles — zsh, tmux, git, and a full developer toolchain.
site_author: Brad Bergeron
site_url: https://bradbergeron-us.github.io/dotfiles/
repo_name: bradbergeron-us/dotfiles
repo_url: https://github.com/bradbergeron-us/dotfiles
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/console
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Tokyo Night (dark) — shown by default
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Tokyo Night Day (light)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradbergeron-us/dotfiles
      name: dotfiles on GitHub

copyright: Copyright &copy; Brad Bergeron

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Tutorials:
      - Getting Started (Your First Hour): tutorials/getting-started.md
      - Set Up a Work Laptop: tutorials/work-laptop.md
      - Adopt a Profile: tutorials/adopt-profile.md
  - How-to:
      - Add a tracked dotfile: how-to/add-a-dotfile.md
      - Manage packages: how-to/manage-packages.md
      - Manage secrets: how-to/manage-secrets.md
      - Add a zsh plugin: how-to/add-a-zsh-plugin.md
      - Write a test: how-to/write-a-test.md
      - Schedule updates: how-to/schedule-updates.md
      - Recover from a failed update: how-to/recover-from-a-failed-update.md
      - Clean up dotfiles: cleanup.md
  - Profiles: profiles.md
  - Usage: usage.md
  - Setup:
      - Dry-Run & Pre-flight: DRY_RUN_AND_PREFLIGHT.md
      - GPG Commit Signing: GPG_SIGNING.md
      - Encrypted Secrets: secrets.md
  - Work Machine:
      - Overview: work-machine.md
      - Complete Setup Guide: work-setup-complete.md
      - Claude Code SSL Fix: claude-code-ssl-fix.md
      - Vets-Website Scripts: vets-website.md
  - Reference:
      - dotfiles CLI: cli.md
      - Zsh Configuration: zsh.md
      - Ghostty: ghostty.md
      - Tool Reference: tools.md
      - Shell Performance: performance.md
      - Troubleshooting: troubleshooting.md
  - Explanation:
      - Architecture: architecture.md
      - Glossary: glossary.md
  - Roadmap:
      - Quick Reference: roadmap-quick-reference.md
      - Personal Workstation: roadmap-personal-workstation.md
      - Work Laptop Management: roadmap-work-laptop-management.md
  - Contributing: contributing.md
