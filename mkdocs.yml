site_name: dotfiles
site_description: Personal macOS dotfiles — zsh, tmux, git, and a full developer toolchain.
site_author: Brad Bergeron
site_url: https://bradbergeron-us.github.io/dotfiles/
repo_name: bradbergeron-us/dotfiles
repo_url: https://github.com/bradbergeron-us/dotfiles
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Tutorials:
      - Getting Started (Your First Hour): tutorials/getting-started.md
      - Set Up a Work Laptop: tutorials/work-laptop.md
      - Adopt a Profile: tutorials/adopt-profile.md
  - Profiles: profiles.md
  - Usage: usage.md
  - Setup:
      - Dry-Run & Pre-flight: DRY_RUN_AND_PREFLIGHT.md
      - GPG Commit Signing: GPG_SIGNING.md
      - Encrypted Secrets: secrets.md
  - Work Machine:
      - Overview: work-machine.md
      - Complete Setup Guide: work-setup-complete.md
      - Claude Code SSL Fix: claude-code-ssl-fix.md
  - Reference:
      - Tool Reference: tools.md
      - Shell Performance: performance.md
      - Troubleshooting: troubleshooting.md
  - Explanation:
      - Architecture: architecture.md
      - Glossary: glossary.md
  - Contributing: contributing.md
