name: release

on:
  push:
    branches:
      - main

# release-please needs to push the release branch/commit (contents) and
# open/update the release pull request (pull-requests).
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Reads Conventional Commits since the last release, maintains
      # CHANGELOG.md, and keeps a "release PR" open. Merging that PR tags the
      # version (vX.Y.Z) and publishes a GitHub release.
      #
      # NOTE: release-type lives in release-please-config.json, NOT here — when
      # the action is given a `release-type` input it ignores config-file.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
