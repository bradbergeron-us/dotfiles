name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

# Three parallel jobs:
#   shellcheck       — lint bash scripts (ubuntu, fast)
#   zsh-syntax       — zsh -n on all shell files + Brewfile parse check (macos)
#   install-smoke    — run install.sh against a temp HOME, verify every symlink (macos)

jobs:
  # ------------------------------------------------------------------
  # 1. shellcheck — static analysis on bash scripts
  #    Runs on ubuntu-latest to avoid consuming macOS runner minutes.
  #    install.sh is zsh — checked in the zsh-syntax job instead.
  # ------------------------------------------------------------------
  shellcheck:
    name: Lint bash scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      # Lint every top-level *.sh plus scripts/, scripts/lib/, and scripts/tests/
      # in one pass so new scripts are covered automatically. zsh files
      # (install.sh, scripts/setup_gpg_signing.sh) are detected by shebang and
      # routed to the zsh-syntax job instead, since shellcheck only understands
      # sh/bash/dash/ksh.
      - name: shellcheck all bash scripts
        run: |
          fail=0
          shopt -s nullglob
          for script in *.sh scripts/*.sh scripts/lib/*.sh scripts/tests/*.sh; do
            if head -1 "$script" | grep -q 'zsh'; then
              echo "SKIP (zsh, see zsh-syntax job): $script"
              continue
            fi
            echo "==> shellcheck -S warning $script"
            shellcheck -S warning "$script" || fail=1
          done
          if [[ "$fail" -ne 0 ]]; then
            echo "shellcheck reported problems"
            exit 1
          fi
          echo "All bash scripts passed shellcheck."

  # ------------------------------------------------------------------
  # 2. zsh-syntax — syntax-check every shell file + parse the Brewfile
  #    Uses macOS because zsh -n on zsh-specific syntax needs a real zsh.
  # ------------------------------------------------------------------
  zsh-syntax:
    name: Zsh syntax + Brewfile validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Syntax-check all shell files
        # install.sh and scripts/setup_gpg_signing.sh are zsh (skipped by the
        # shellcheck job), so they are syntax-checked here with a real zsh.
        run: |
          for f in home/zshrc home/zprofile install.sh bootstrap.sh scripts/macos.sh scripts/setup_gpg_signing.sh; do
            echo "zsh -n $f"
            zsh -n "$f"
          done
          echo "All shell files pass zsh syntax check."

      - name: Validate Brewfiles parse cleanly
        # brew bundle list reads the Brewfile DSL without installing anything.
        # A malformed entry (bad tap, typo in formula name format) exits non-zero.
        # Covers the core Brewfile and every profile overlay.
        run: |
          for bf in Brewfile Brewfile.personal Brewfile.work; do
            echo "==> $bf"
            brew bundle list --all --file="$bf"
          done

  # ------------------------------------------------------------------
  # 3. install-smoke — run install.sh against an isolated temp $HOME
  #    Verifies that every expected symlink is created and none are missing.
  # ------------------------------------------------------------------
  install-smoke:
    name: install.sh smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install.sh against temp HOME (profile-aware)
        run: |
          # Shared verifier: every map record must be linked iff it applies to
          # PROFILE (per profile_includes + the optional tag column).
          # shellcheck source=scripts/lib/profile_helpers.sh
          source scripts/lib/profile_helpers.sh
          verify_links() {
            local h="$1" prof="$2" src dest tags
            while read -r src dest tags; do
              [[ -z "$src" || "$src" == \#* ]] && continue
              if profile_includes "$prof" "${tags:-}"; then
                if [[ -L "$h/$dest" ]]; then echo "OK         $dest"; else echo "MISSING    $dest (expected for $prof)" && return 1; fi
              else
                if [[ -e "$h/$dest" || -L "$h/$dest" ]]; then echo "UNEXPECTED $dest (should be skipped for $prof)" && return 1; else echo "skip       $dest (not in $prof)"; fi
              fi
            done < config/symlinks.map
            return 0
          }

          # --- Default profile (personal): full set, same as before profiles ---
          HOME="$(mktemp -d)"
          export HOME
          echo "Isolated HOME: $HOME"
          zsh install.sh
          echo ""
          echo "--- Verifying symlinks (personal) ---"
          verify_links "$HOME" personal

          echo ""
          echo "--- Verifying ~/.gitconfig is a thin include (not a symlink) ---"
          if [[ -L "$HOME/.gitconfig" ]]; then
            echo "FAIL  ~/.gitconfig is a symlink (should be a thin include file)" && exit 1
          fi
          if [[ -f "$HOME/.gitconfig" ]] && grep -q "home/gitconfig" "$HOME/.gitconfig"; then
            echo "OK  ~/.gitconfig includes the tracked config"
          else
            echo "FAIL  ~/.gitconfig missing or does not include home/gitconfig" && exit 1
          fi

          echo ""
          echo "--- Idempotency: a second run must back up nothing ---"
          # Re-run against the SAME temp HOME. Every dotfile is already linked, so
          # the summary must report "0 backed up".
          second_output=$(zsh install.sh)
          echo "$second_output"
          if echo "$second_output" | grep -q "0 backed up"; then
            echo "OK  second run reports 0 backed up"
          else
            echo "FAIL  second run did not report '0 backed up'" && exit 1
          fi

          # --- minimal profile: GUI-tagged links must be skipped ---
          echo ""
          echo "--- Verifying minimal profile skips gui-tagged links ---"
          MIN_HOME=$(mktemp -d)
          HOME="$MIN_HOME" DOTFILES_PROFILE=minimal zsh install.sh
          verify_links "$MIN_HOME" minimal
          for gui_dest in .hyper.js .config/ghostty/config; do
            if [[ -e "$MIN_HOME/$gui_dest" || -L "$MIN_HOME/$gui_dest" ]]; then
              echo "FAIL  $gui_dest should be skipped on minimal" && exit 1
            fi
          done
          echo "OK  gui-tagged links skipped on minimal"

          echo ""
          echo "--- Residue: no files created/modified in the repo dir ---"
          # install.sh must not create or modify anything tracked here, so the
          # working tree must stay clean after running.
          residue=$(git status --porcelain --untracked-files=all)
          if [[ -n "$residue" ]]; then
            echo "FAIL  install.sh created/modified files in the repo dir:"
            echo "$residue"
            exit 1
          fi
          echo "OK  no residue files created in the repo dir"

  # ------------------------------------------------------------------
  # 4. secret-scan — gitleaks via the maintained action (prebuilt binary,
  #    no on-the-fly build). On push/PR it scans only the new commits, so
  #    it stays fast and green while catching newly introduced secrets.
  # ------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 5. actionlint — lint the workflow files themselves. Catches invalid
  #    workflow syntax / bad expressions, and (via the bundled shellcheck)
  #    issues in `run:` blocks the shellcheck job above does not cover.
  #    Pinned to match the pre-commit hook and `brew install actionlint`.
  # ------------------------------------------------------------------
  actionlint:
    name: Lint GitHub Actions workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
