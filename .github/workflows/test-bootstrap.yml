name: Test shell scripts

# Auto-discovers and runs every bats unit test (scripts/tests/*.bats).
# New test files are picked up without editing this workflow, so the trigger
# watches the whole scripts/ directory plus the scripts under test.
on:
  push:
    paths:
      - 'bootstrap.sh'
      - 'update.sh'
      - 'verify.sh'
      - 'scripts/**'
      - '.github/workflows/test-bootstrap.yml'
  pull_request:
    paths:
      - 'bootstrap.sh'
      - 'update.sh'
      - 'verify.sh'
      - 'scripts/**'
      - '.github/workflows/test-bootstrap.yml'

jobs:
  unit-tests:
    name: Run bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install bats-core
        # The suite only uses core bats features (setup/teardown, @test, run,
        # skip, $BATS_TEST_TMPDIR) — no external bats-assert/bats-support
        # libraries are required.
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Syntax check
        # Syntax-check the scripts under test plus their helpers with `bash -n`,
        # and parse-check every .bats file with `bats --count` (which loads and
        # parses each file without running any test). New scripts/tests/*.bats
        # files are covered automatically.
        run: |
          for f in bootstrap.sh verify.sh \
                   scripts/lib/bootstrap_helpers.sh \
                   scripts/lib/verify_helpers.sh \
                   scripts/lib/dryrun_helpers.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done
          echo "bash -n scripts/tests/test_helper.bash"
          bash -n scripts/tests/test_helper.bash
          echo "bats --count scripts/tests/ (parse-check all .bats files)"
          bats --count scripts/tests/
          echo "All scripts pass syntax check."

      - name: Run tests
        # Auto-discover and run every bats unit test. New scripts/tests/*.bats
        # files are picked up without naming them here.
        run: |
          shopt -s nullglob
          tests=(scripts/tests/*.bats)
          if [[ ${#tests[@]} -eq 0 ]]; then
            echo "No bats test files found (scripts/tests/*.bats)" && exit 1
          fi
          bats scripts/tests/
          echo "All bats unit tests passed."
