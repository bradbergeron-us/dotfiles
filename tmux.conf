# --------#
# General #
# --------#

# Default shell
set -g default-shell $SHELL

# Mouse
set -g mouse on

# History
set -g history-limit 102400

# Set windows and page index to base 1
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows when creating/closing new windows
set -g renumber-windows on

# Use emacs key bindings in status line
set-option -g status-keys emacs

# Use vim key bindings in copy mode
setw -g mode-keys vi

# Fix ESC delay in vim
set -g escape-time 10

# ------------#
# Keybindings #
# ------------#

# Set prefix to C-a
unbind C-b
set -g prefix C-a

# Copy-mode
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Send command on double press
bind C-a send-prefix
bind C-l send-keys 'C-l'

# Reload tmux.conf on prefix r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes and remember current path
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Remember current path when creating new windows
bind c new-window -c '#{pane_current_path}'

# Break pane into new window and keep focus on the current window
bind b break-pane -d

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n 'C-\' if-shell "$is_vim" "send-keys 'C-\'" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# -----------#
# Status bar #
# -----------#

set-option -g status-bg colour235
set-option -g status-interval 10
set-option -g status-left '#[fg=colour75,bold] #S #[default]│ '
set-option -g status-left-length 24
set-option -g status-right '#[fg=colour245] node #[fg=colour75]#(mise current node 2>/dev/null) #[fg=colour245]│  ruby #[fg=colour75]#(mise current ruby 2>/dev/null) #[fg=colour245]│  %a %d %b  %H:%M '
set-option -g status-right-length 100

set-option -g pane-border-style fg=colour238
set-option -g pane-active-border-style fg=colour75

set-window-option -g window-status-format '#[fg=colour245] #I:#W#F '
set-window-option -g window-status-current-format '#[fg=colour75,bold] #I:#W#F '

# ---------#
# Plugins  #
# ---------#
# TPM — Tmux Plugin Manager
# First-time setup: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# (bootstrap.sh does this automatically)
#
# Key bindings (after tmux is running):
#   prefix + I        install new plugins
#   prefix + U        update all plugins
#   prefix + alt + u  remove unused plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # sensible defaults everyone can agree on
set -g @plugin 'tmux-plugins/tmux-resurrect'   # persist sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions every 15 min

# tmux-resurrect: save/restore key bindings
# prefix + Ctrl-s  → save session
# prefix + Ctrl-r  → restore session
set -g @resurrect-capture-pane-contents 'on'   # restore pane contents too

# tmux-continuum: auto-save and auto-restore
set -g @continuum-restore 'on'                  # restore last saved session on tmux start
set -g @continuum-save-interval '15'            # save every 15 minutes

# IMPORTANT: keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
